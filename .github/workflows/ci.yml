name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

env:
    # 统一 node 版本
    NODE_VERSION: '22'
    CI: true

# ── 通用步骤宏 ──
# 由于 GitHub Actions 不支持 YAML 锚点在 steps 中使用，
# 下面通过 setup-node + 公共依赖安装步骤在各 job 中展开

jobs:
    # ── Formatting ──
    format:
        name: Prettier
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm ci
            - name: Check formatting
              run: npm run format:check

    # ── Type checking (non-blocking — pi API version mismatch) ──
    typecheck:
        name: TypeScript
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm ci
            - name: TypeScript check
              run: npm run typecheck

    # ── Linting (non-blocking — 10 pre-existing errors in sub-packages) ──
    lint:
        name: ESLint
        runs-on: ubuntu-latest
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - run: npm ci
            - name: ESLint check
              run: npm run lint

    # ── SAST ──
    semgrep:
        name: Semgrep
        runs-on: ubuntu-latest
        container:
            image: semgrep/semgrep:latest
        steps:
            - uses: actions/checkout@v4
            - name: Semgrep ERROR (blocks merge)
              run: |
                  semgrep --config .semgrep.yml \
                    --exclude 'node_modules/**' \
                    --exclude '.pi/**' \
                    --exclude '.git/**' \
                    --metrics=off \
                    --no-git-ignore \
                    --error \
                    --severity ERROR
            - name: Semgrep WARNING (report only)
              if: always()
              run: |
                  semgrep --config .semgrep.yml \
                    --exclude 'node_modules/**' \
                    --exclude '.pi/**' \
                    --exclude '.git/**' \
                    --metrics=off \
                    --no-git-ignore \
                    --severity WARNING

    # ── E2E Tests (with mock LLM, no API key required) ──
    # 故意设为 continue-on-error: true（非阻塞参考测试），原因：
    # 1. permission-gate TUI 日志测试仍含 1 个 [REVIEW] 用例需人工衡量
    # 2. 其他模块可能仍有 REVIEW 用例
    # 若需改为阻塞模式，需先让所有模块的 REVIEW 用例归零
    e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        continue-on-error: true
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - name: Install project dependencies
              run: npm ci
            - name: Setup CI environment
              run: bash scripts/setup-ci.sh
            - name: Run Vitest tests
              run: npm test
            - name: Run bash e2e tests (auto-pool)
              # 并行度自动检测：GitHub Actions=2核→pool=4
              env:
                  E2E_POOL_SIZE: 4
              run: bash test/scripts/run-e2e.sh
            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-test-results
                  path: test/results/
            - name: Show summary
              if: always()
              run: |
                  LATEST=$(ls -1t test/results/ 2>/dev/null | head -1)
                  if [[ -n "$LATEST" ]]; then
                    SF="test/results/$LATEST/summary.md"
                    if [[ -f "$SF" ]]; then
                      cat "$SF"
                    else
                      echo "(no summary in $LATEST)"
                      ls -la "test/results/$LATEST/" 2>/dev/null || true
                    fi
                  else
                    echo "(no test results directory found)"
                  fi

    # ── Worktree E2E Tests (blocking) ──
    # 独立 job：worktree 扩展的测试作为 required status check 阻断合并
    e2e-worktree:
        name: E2E Worktree
        runs-on: ubuntu-latest
        continue-on-error: false
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
            - name: Install project dependencies
              run: npm ci
            - name: Setup CI environment
              run: bash scripts/setup-ci.sh
            - name: Run Vitest worktree tests
              run: |
                  npx vitest run \
                    test/vitest/extensions/worktree.test.ts \
                    test/vitest/extensions/worktree.operations.test.ts
            - name: Run bash e2e worktree tests
              run: bash test/scripts/run-e2e.sh --ext worktree
