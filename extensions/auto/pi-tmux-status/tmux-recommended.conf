# ============================================================
# pi-tmux-status 推荐 tmux 配置
# ============================================================
# 将本文件内容添加到 ~/.tmux.conf，或选择性复制关键段落。
#
# 核心要求（必须）：
#   1. pane-border-status top          ← 启用顶部边框标题
#   2. pane-border-format 包含脚本调用  ← 显示 AI 状态文本
#   3. 快捷键绑定（可选）               ← 方便创建 AI 工作区
#
# 完整配置参考：
#   ~/.tmux.conf 中已有的 AI 工作区配置
# ============================================================

# === 1. 窗格状态可视化（必选） ===
# 启用窗格标题（顶部显示）
set -g pane-border-status top

# 窗格标题格式：显示 AI 状态 + 当前命令 + 窗格编号
# 其中 tmux-pane-title 脚本会输出带 #[fg=colour] 颜色的状态文字
set -g pane-border-format '#( ~/.local/bin/tmux-pane-title #{pane_id}) | #{pane_current_command} | #P '

# 窗格边框颜色（基础默认值）
# 🟢 绿色 = 默认/Pi 扩展会动态覆盖
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour82,bold

# 刷新频率（影响 pane-border-format 中的 #() 刷新间隔）
set -g status-interval 5

# === 2. 扩展键支持（Pi 推荐） ===
# 使 Shift+Enter / Ctrl+Enter 能被 Pi 正确识别
set -g extended-keys on
set -g extended-keys-format csi-u

# === 3. AI 工作区快捷键（可选） ===

# 创建 AI 工作区：左侧 30% 宽度给 AI 工具，右侧主区域
# 自动启动 pi-tmux-status 的边框颜色监控
bind C-m new-window -n 'ai-workspace' \; \
    split-window -h -p 30 \; \
    send-keys 'claude' C-m \; \
    split-window -v -p 50 \; \
    send-keys 'claude' C-m \; \
    select-pane -t 1 \; \
    run-shell '~/.local/bin/tmux-ai-style-monitor.sh &'

# 使用监控版本启动 Claude（带任务完成通知 + 边框颜色监控）
bind C-c run-shell 'tmux split-window -h -p 30 " ~/.local/bin/tmux-claude-monitor.sh"' \; \
    run-shell '~/.local/bin/tmux-ai-style-monitor.sh &'

# 快速切换 AI 窗格（Alt + 数字）
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3

# === 5. 系统剪贴板集成（推荐） ===
# 让 tmux 内的选择复制到 macOS 系统剪贴板，iTerm2 划线粘贴才能生效
# Vim 模式复制键
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# 鼠标拖拽选择 → 自动复制到系统剪贴板
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# 中键（鼠标第2键）→ 粘贴系统剪贴板内容
bind -n MouseDown2Pane if-shell "which pbpaste >/dev/null" {
    run-shell "tmux set-buffer -b pastebuffer \"$(pbpaste -Prefer txt)\""
    paste-buffer -b pastebuffer
}

# === 6. 基础优化（推荐） ===
# 解决切换时的渲染残留
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on

# 鼠标支持
set -g mouse on

# 历史记录限制
set -g history-limit 50000
